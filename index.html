<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EV Unplug Time</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
body {
  font-family: system-ui, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  margin: 0;
  padding: 1rem;
}
h1 { text-align: center; }
.card {
  max-width: 420px;
  margin: auto;
  background: #020617;
  border-radius: 12px;
  padding: 1rem;
}
label {
  display: block;
  margin-top: 0.75rem;
}
input {
  width: 100%;
  padding: 0.5rem;
  margin-top: 0.25rem;
  border-radius: 6px;
  border: none;
}
button {
  width: 100%;
  margin-top: 1rem;
  padding: 0.75rem;
  font-size: 1rem;
  border-radius: 8px;
  border: none;
  background: #22c55e;
  color: #022c22;
  font-weight: 600;
}
.result {
  margin-top: 1rem;
  background: #020617;
  border-radius: 8px;
  padding: 0.75rem;
}
</style>
</head>

<body>
<h1>🔌 EV Unplug Time</h1>

<div class="card">
  <label>Battery capacity (kWh)
    <input id="capacity" type="number" step="0.1" value="50">
  </label>

  <label>Current charge (%)
    <input id="startPct" type="number" value="">
  </label>

  <label>Target charge (%)
    <input id="targetPct" type="number" value="85">
  </label>

  <label>Charging power (kW)
    <input id="power" type="number" step="0.1" value="10.8">
  </label>

  <label>Start time
    <input id="startTime" type="datetime-local">
  </label>

  <button id="calcBtn">Calculate & Set Alarm</button>

  <div class="result" id="result"></div>
</div>

<script>
/* ---------------- SERVICE WORKER ---------------- */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

/* ---------------- ELEMENT REFERENCES ---------------- */
const capacityInput  = document.getElementById("capacity");
const startPctInput  = document.getElementById("startPct");
const targetPctInput = document.getElementById("targetPct");
const powerInput     = document.getElementById("power");
const startTimeInput = document.getElementById("startTime");
const resultDiv      = document.getElementById("result");
const calcBtn        = document.getElementById("calcBtn");

/* ---------------- NOTIFICATIONS ---------------- */
async function ensureNotificationPermission() {
  if (!("Notification" in window)) return false;
  if (Notification.permission === "granted") return true;
  const p = await Notification.requestPermission();
  return p === "granted";
}

let alarmTimeout = null;

/* ---------------- CALCULATION ---------------- */
async function calculate() {
  const capacity = parseFloat(capacityInput.value);
  const startPct = parseFloat(startPctInput.value);
  const targetPct = parseFloat(targetPctInput.value);
  const power = parseFloat(powerInput.value);

  if (
    isNaN(capacity) || isNaN(startPct) ||
    isNaN(targetPct) || isNaN(power)
  ) {
    resultDiv.textContent = "Please fill in all fields.";
    return;
  }

  if (targetPct <= startPct) {
    resultDiv.textContent = "Target percentage must be higher than current charge.";
    return;
  }

  const energyNeeded = capacity * (targetPct - startPct) / 100;
  const hoursNeeded = energyNeeded / power;

  const startTime = startTimeInput.value
    ? new Date(startTimeInput.value)
    : new Date();

  const endTime = new Date(startTime.getTime() + hoursNeeded * 3600000);

  resultDiv.innerHTML = `
    <strong>Energy needed:</strong> ${energyNeeded.toFixed(2)} kWh<br>
    <strong>Charging time:</strong> ${hoursNeeded.toFixed(2)} h<br>
    <strong>Unplug at:</strong><br>${endTime.toLocaleString()}
  `;

  if (!(await ensureNotificationPermission())) return;

  if (alarmTimeout) clearTimeout(alarmTimeout);

  const delay = endTime.getTime() - Date.now();
  if (delay > 0) {
    alarmTimeout = setTimeout(() => {
      navigator.serviceWorker.ready.then(reg =>
        reg.showNotification("EV Charging Complete", {
          body: "Estimated target charge reached. You can unplug now.",
          vibrate: [200, 100, 200]
        })
      );
    }, delay);
  }
}

/* ---------------- EVENTS ---------------- */
calcBtn.addEventListener("click", calculate);

/* ---------------- DEFAULT START TIME ---------------- */
const now = new Date();
now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
startTimeInput.value = now.toISOString().slice(0,16);
</script>

</body>
</html>
