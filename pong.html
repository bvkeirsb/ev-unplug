<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: black; }
        canvas { background: #eee; }
        #score { color: white; font-size: 30px; position: absolute; top: 20px; }
    </style>
</head>
<body>
    <div id="score">Player: 0 | AI: 0</div>
    <canvas id="pong" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');
        const paddleWidth = 10;
        const paddleHeight = 100;
        const ballSize = 10;

        // Define paddles and ball
        const player = { x: 0, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, dy: 0, score: 0 };
        const ai = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, speed: 4 };
        const ball = { x: canvas.width / 2, y: canvas.height / 2, radius: ballSize / 2, speed: 4, dx: 4, dy: 4 };

        // Control paddles
        window.addEventListener('mousemove', (event) => {
            const rect = canvas.getBoundingClientRect();
            const root = document.documentElement;
            const mouseY = event.clientY - rect.top - root.scrollTop;
            player.y = mouseY - player.height / 2;
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowUp') {
                player.dy = -10;
            } else if (event.key === 'ArrowDown') {
                player.dy = 10;
            }
        });

        window.addEventListener('keyup', (event) => {
            if (event.key === 'ArrowUp' || event.key === 'ArrowDown') {
                player.dy = 0;
            }
        });

        // Update game state
        function update() {
            // Move player paddle
            player.y += player.dy;
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;

            // Move AI paddle
            ai.y += (ball.y - (ai.y + ai.height / 2)) * 0.1;
            if (ai.y < 0) ai.y = 0;
            if (ai.y + ai.height > canvas.height) ai.y = canvas.height - ai.height;

            // Move ball
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collisions
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.dy *= -1;
            }

            // Paddle collisions
            if (ball.x - ball.radius < player.x + player.width && ball.y > player.y && ball.y < player.y + player.height) {
                ball.dx *= -1;
            } else if (ball.x + ball.radius > ai.x && ball.y > ai.y && ball.y < ai.y + ai.height) {
                ball.dx *= -1;
            }

            // Scoring
            if (ball.x - ball.radius < 0) {
                ai.score++;
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                player.score++;
                resetBall();
            }

            // Update score display
            document.getElementById('score').innerText = `Player: ${player.score} | AI: ${ai.score}`;
        }

        // Reset ball to center
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = -ball.dx;
            ball.dy = Math.random() > 0.5 ? 4 : -4;
        }

        // Draw the game
        function draw() {
            context.fillStyle = '#eee';
            context.fillRect(0, 0, canvas.width, canvas.height);
            context.fillStyle = 'blue';
            context.fillRect(player.x, player.y, player.width, player.height);
            context.fillStyle = 'red';
            context.fillRect(ai.x, ai.y, ai.width, ai.height);
            context.fillStyle = 'black';
            context.beginPath();
            context.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            context.fill();
        }

        // Main game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start game
        gameLoop();
    </script>
</body>
</html>
